syntax = "proto3";

package user;

option go_package = "grpc-demo/proto/userpb";

// ─── Messages ───────────────────────────────────────────────
// These define the SHAPE of data sent over the wire (like JSON but binary & faster)

message GetUserRequest {
  int32 id = 1;       // field number (NOT value) — used for binary encoding
}

message User {
  int32 id = 1;
  string name = 2;
  string email = 3;
}

message UserList {
  repeated User users = 1;  // "repeated" = array/slice
}

message Empty {}

// ─── Service ────────────────────────────────────────────────
// This defines the RPC methods the server exposes (like API endpoints)

service UserService {
  // Unary RPC — one request, one response (like REST GET)
  rpc GetUser(GetUserRequest) returns (User);

  // Server streaming RPC — one request, stream of responses
  rpc ListUsers(Empty) returns (stream User);
}
