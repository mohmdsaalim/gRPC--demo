syntax = "proto3";

package order;

option go_package = "grpc-demo/proto/orderpb";

// ─── Messages ───────────────────────────────────────────────

message CreateOrderRequest {
  int32 user_id = 1;
  string item = 2;
  int32 quantity = 3;
  float price = 4;
}

message Order {
  int32 id = 1;
  int32 user_id = 2;
  string item = 3;
  int32 quantity = 4;
  float price = 5;
  string status = 6;
}

message GetOrderRequest {
  int32 id = 1;
}

message OrdersByUserRequest {
  int32 user_id = 1;
}

message OrderList {
  repeated Order orders = 1;
}

// ─── Service ────────────────────────────────────────────────

service OrderService {
  // Unary RPC — create an order
  rpc CreateOrder(CreateOrderRequest) returns (Order);

  // Unary RPC — get single order
  rpc GetOrder(GetOrderRequest) returns (Order);

  // Server streaming — get all orders for a user (streamed one by one)
  rpc GetOrdersByUser(OrdersByUserRequest) returns (stream Order);
}
